name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Compute CalVer version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calver.outputs.next_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Compute next CalVer
        id: calver
        uses: energostack/calver-action@v1

      - name: Echo
        env:
          VERSION: ${{ steps.calver.outputs.next_version }}
        run: echo "Next version is ${VERSION}"

  build:
    name: Build (${{ matrix.artifact }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            formats: dmg,app
            artifact: macos-arm64
          - runner: macos-latest
            target: x86_64-apple-darwin
            formats: dmg,app
            artifact: macos-x64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            formats: deb,appimage
            artifact: linux
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
            artifact: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          curl -fsSL https://raw.githubusercontent.com/zed-industries/zed/main/script/linux -o /tmp/zed-linux-deps.sh
          bash /tmp/zed-linux-deps.sh

      - name: Stamp CalVer into Cargo.toml
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: python3 script/set-version.py "${VERSION}"

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build and package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          FORMATS: ${{ matrix.formats }}
        run: |
          cargo build -p desktop --release --target "$TARGET"
          cargo packager --release \
            -p desktop \
            --target "$TARGET" \
            --formats "$FORMATS"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/dist/

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -print0 | sort -z | xargs -0 sha256sum > ../checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          gh release create "${VERSION}" \
            --title "Based ${VERSION#v}" \
            --target "${SHA}" \
            --generate-notes \
            dist/* checksums.txt
