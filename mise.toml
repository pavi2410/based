[tools]
rust = "latest"
node = "26"
pnpm = "11"
lefthook = { version = "latest", postinstall = "lefthook install" }

[tasks.dev]
description = "Run desktop app in development mode"
run = "cargo run -p desktop"

[tasks.build]
description = "Build desktop app in release mode"
run = "cargo build -p desktop --release"

[tasks.package]
description = "Build release installers locally (current platform)"
depends = ["build"]
run = "cargo packager --release -p desktop"

[tasks.check]
description = "Fast compile check (no linking)"
run = "cargo check -p desktop"

[tasks.clean]
description = "Clean Rust build artifacts"
run = "cargo clean"

[tasks.lint]
description = "Run clippy checks"
run = "cargo clippy --workspace --all-targets"

[tasks.lint-fix]
description = "Run clippy checks and fix linting errors"
run = "cargo clippy --workspace --all-targets --fix --allow-dirty"

[tasks.format]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.web-dev]
description = "Run Based landing page dev server"
run = "pnpm --dir apps/web dev"

[tasks.web-format]
description = "Format apps/web with oxfmt"
run = "pnpm --dir apps/web format"

[tasks.web-lint-fix]
description = "Fix oxlint issues in apps/web"
run = "pnpm --dir apps/web lint-fix"

[tasks.web-lint]
description = "Run oxlint in apps/web"
run = "pnpm --dir apps/web lint"

[tasks.web-check]
description = "Run astro check in apps/web"
run = "pnpm --dir apps/web check"

[tasks.web-build]
description = "Build Based landing page for production"
run = "pnpm --dir apps/web build"

[tasks.web-preview]
description = "Build and preview landing page via Wrangler"
run = "pnpm --dir apps/web preview"

[tasks.web-deploy]
description = "Build and deploy landing page to Cloudflare Workers"
run = "pnpm --dir apps/web deploy"
