name: publish

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os_name: linux
            target: x86_64-unknown-linux-gnu
            binary_name: desktop-native
          - platform: windows-latest
            os_name: windows
            target: x86_64-pc-windows-msvc
            binary_name: desktop-native.exe
          - platform: macos-latest
            os_name: macos-arm64
            target: aarch64-apple-darwin
            binary_name: desktop-native
          - platform: macos-latest
            os_name: macos-x64
            target: x86_64-apple-darwin
            binary_name: desktop-native

    name: Building for ${{ matrix.os_name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build desktop-native
        run: cargo build -p desktop-native --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-native-${{ matrix.os_name }}
          path: dist/${{ matrix.binary_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
