services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: based
      POSTGRES_PASSWORD: based
      POSTGRES_DB: based
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U based -d based"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "37017:27017"
    # Optional: set MONGO_INITDB_ROOT_USERNAME and MONGO_INITDB_ROOT_PASSWORD for auth
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
