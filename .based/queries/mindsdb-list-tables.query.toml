schema_version = 1

name = "List Tables"
description = "Tables in the MindsDB demo database"
tags = ["schema", "meta"]

[target]
connection = "public/mindsdb"

[sql]
query = """
SELECT table_schema AS schema, table_name AS name
FROM information_schema.tables
WHERE table_type = 'BASE TABLE'
  AND table_schema IN ('demo', 'demo_data', 'public')
ORDER BY table_schema, table_name;
"""
