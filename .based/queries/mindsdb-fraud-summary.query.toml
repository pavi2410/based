schema_version = 1

name = "Fraud Summary"
description = "Transaction counts by type and fraud flag"
tags = ["fraud", "reports"]

[target]
connection = "public/mindsdb"

[sql]
query = """
SELECT type, isFraud, COUNT(*) AS tx_count, ROUND(SUM(amount)::numeric, 2) AS total_amount
FROM demo.fraud_detection
GROUP BY type, isFraud
ORDER BY type, isFraud;
"""
