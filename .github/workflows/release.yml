name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Release bump type
        required: true
        type: choice
        options: [rc, stable, patch, minor, major]
        default: rc
      ref:
        description: Git ref to release from
        required: false
        default: main

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      prerelease: ${{ steps.bump.outputs.prerelease }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Bump version
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          NEW_VERSION="$(python3 script/bump-version.py "$BUMP" --write)"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${NEW_VERSION}" == *"-rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/Cargo.toml
          git commit -m "chore: release v${NEW_VERSION}"

      - name: Push
        id: push
        env:
          REF: ${{ inputs.ref }}
        run: |
          git push origin "HEAD:${REF}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.artifact }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            formats: dmg,app
            artifact: macos-arm64
          - runner: macos-latest
            target: x86_64-apple-darwin
            formats: dmg,app
            artifact: macos-x64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            formats: deb,appimage
            artifact: linux
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
            artifact: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          curl -fsSL https://raw.githubusercontent.com/zed-industries/zed/main/script/linux -o /tmp/zed-linux-deps.sh
          bash /tmp/zed-linux-deps.sh

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build and package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          FORMATS: ${{ matrix.formats }}
        run: |
          cargo build -p desktop --release --target "$TARGET"
          cargo packager --release \
            -p desktop \
            --target "$TARGET" \
            --formats "$FORMATS"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/dist/

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -print0 | sort -z | xargs -0 sha256sum > ../checksums.txt

      - name: Create and push tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi
          git tag -a "$TAG" -m "Based ${VERSION}"
          git push origin "$TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Based ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.prerelease != 'true' }}
          draft: false
          generate_release_notes: true
          files: |
            dist/**/*
            checksums.txt
