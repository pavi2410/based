name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Compute CalVer version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Compute next CalVer
        id: next
        run: |
          VERSION=$(python3 script/next-version.py)
          echo "Next version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.artifact }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            formats: dmg,app
            artifact: macos-arm64
          - runner: macos-latest
            target: x86_64-apple-darwin
            formats: dmg,app
            artifact: macos-x64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            formats: deb,appimage
            artifact: linux
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
            artifact: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          curl -fsSL https://raw.githubusercontent.com/zed-industries/zed/main/script/linux -o /tmp/zed-linux-deps.sh
          bash /tmp/zed-linux-deps.sh

      - name: Stamp CalVer into Cargo.toml
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: python3 script/set-version.py "${VERSION}"

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build and package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          FORMATS: ${{ matrix.formats }}
        run: |
          cargo build -p desktop --release --target "$TARGET"
          cargo packager --release \
            -p desktop \
            --target "$TARGET" \
            --formats "$FORMATS"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          # Only upload finished installer files. cargo-packager produces a
          # .app bundle as a build-time intermediate for the .dmg, but the
          # .dmg already contains the .app — shipping the bare bundle
          # separately is redundant. Listing concrete extensions also keeps
          # the upload step from accidentally including a directory, which
          # is what broke gh release create in the past.
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.msi
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          # -maxdepth 1: don't descend into Based.app bundles, only checksum the top-level installer files.
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > ../checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Based ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: "true"
          draft: false
          # `dist/*` matches one level only so .app directories are filtered as
          # directories by the action (which uploads files only), not recursed
          # into. The .dmg next to each .app is what end users actually install.
          files: |
            dist/*
            checksums.txt
