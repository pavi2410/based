[tools]
rust = "latest"

[tasks.dev]
description = "Run desktop app in development mode"
run = "cargo run -p desktop"

[tasks.build]
description = "Build desktop app in release mode"
run = "cargo build -p desktop --release"

[tasks.package]
description = "Build release installers locally (current platform)"
depends = ["build"]
run = "cargo packager --release -p desktop"

[tasks.check]
description = "Fast compile check (no linking)"
run = "cargo check -p desktop"

[tasks.clean]
description = "Clean Rust build artifacts"
run = "cargo clean"

[tasks.lint]
description = "Run clippy checks"
run = "cargo clippy --workspace --all-targets"

[tasks.lint-fix]
description = "Run clippy checks and fix linting errors"
run = "cargo clippy --workspace --all-targets --fix"

[tasks.format]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"
