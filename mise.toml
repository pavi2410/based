[tools]
rust = "latest"

[tasks.dev]
description = "Run desktop app in development mode"
run = "cargo run -p desktop"

[tasks.build]
description = "Build desktop app in release mode"
run = "cargo build -p desktop --release"

[tasks.clean]
description = "Clean Rust build artifacts"
run = [
  "cargo clean"
]

[tasks."native:dev"]
description = "Run the native GPUI desktop app in development mode"
run = "cargo run -p desktop"

[tasks."native:check"]
description = "Cargo check the native GPUI app (fast compile check)"
run = "cargo check -p desktop"

[tasks."native:build"]
description = "Build the native GPUI app in release mode"
run = "cargo build -p desktop --release"

[tasks.lint]
description = "Run clippy checks"
run = "cargo clippy --workspace --all-targets"

[tasks.format]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks."type-check"]
description = "Run Rust tests as type/compile safety gate"
run = "cargo test --workspace"
