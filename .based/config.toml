version = 1
name = "based"
description = "A new Based project"

[connection.northwind]
label = "Northwind Database"
engine = "sqlite"
group = "local"
file = "data/northwind.db"

[connection.local_postgres]
label = "Local PostgreSQL (Docker)"
engine = "postgres"
group = "local"
host = "localhost"
port = 5432
database = "based"
username = "based"
password = "based"
ssl = false

# public postgres database
# source: https://rnacentral.org/help/public-database
# postgres://reader:NWDMCE5xdipIjRrp@hh-pgsql-public.ebi.ac.uk:5432/pfmegrnargs
[connection.public_postgres]
label = "Public PostgreSQL (EBI)"
engine = "postgres"
group = "public"
host = "hh-pgsql-public.ebi.ac.uk"
port = 5432
database = "pfmegrnargs"
username = "reader"
password = "NWDMCE5xdipIjRrp"
ssl = false

[connection.test_mongo]
label = "Local MongoDB (Docker)"
engine = "mongodb"
group = "local"
url = { env = "MONGO_URL" }

[settings]
queryTimeout = 30000
maxResultRows = 1000
enableQueryCache = true
cacheTTL = 3600
